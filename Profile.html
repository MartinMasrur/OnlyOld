<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyOld.com</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#336699;background-image:repeating-linear-gradient(45deg,#4477AA 0 10px,#336699 10px 20px);font-family:Verdana,Geneva,Arial,sans-serif;font-size:11px;color:#000;min-height:100vh}
a{color:#0000CC;text-decoration:underline;cursor:pointer}
a:hover{color:#FF0000}
input,textarea,select{font-family:Verdana,Geneva,Arial,sans-serif;font-size:11px}
button{font-family:Verdana,Geneva,Arial,sans-serif;font-size:11px;cursor:pointer}
.hidden{display:none!important}
.topbar{background:linear-gradient(to bottom,#336699 0%,#003366 60%,#001a33 100%);border-bottom:3px solid #000;padding:4px 10px;display:flex;justify-content:space-between;align-items:center;color:#fff;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100}
.logo{font-family:"Comic Sans MS",cursive;font-size:20px;font-weight:bold;color:#FFFF00;text-shadow:2px 2px 0 #FF00FF,-1px -1px 0 #00FFFF;cursor:pointer}
.logo span{color:#FF66CC}
.topbar-links{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.topbar-links a{color:#CCFFFF;font-weight:bold;font-size:11px;text-decoration:none}
.topbar-links a:hover{color:#FFFF00}
.unread-badge{background:#FF0000;color:#fff;border-radius:2px;padding:0 4px;font-size:10px}
.ticker-wrap{background:#000;color:#00FF00;font-family:"Courier New",monospace;font-size:11px;padding:3px 0;border-bottom:2px solid #FFFF00;overflow:hidden;white-space:nowrap}
.ticker{display:inline-block;padding-left:100%;animation:ticker 28s linear infinite}
@keyframes ticker{to{transform:translateX(-200%)}}
.pagewrap{max-width:820px;margin:12px auto 40px;background:#fff;border:2px solid #000;box-shadow:4px 4px 0 #001a33}
.navrow{background:#D4D0C8;border-bottom:2px solid #808080;padding:5px;display:flex;gap:4px;flex-wrap:wrap}
.btn{background:#D4D0C8;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;padding:4px 10px;font-size:11px;font-weight:bold;color:#000;cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{background:#BBCCDD}
.btn:active{border-top:2px solid #404040;border-left:2px solid #404040;border-right:2px solid #fff;border-bottom:2px solid #fff}
.btn.act{background:#99CCFF}
.btn.danger{background:#FFCCCC}
.btn.pink{background:#FFCCEE}
.layout{display:flex;align-items:flex-start}
.col-left{width:220px;min-width:220px;background:#E8E8F8;border-right:2px solid #999;padding:8px;flex-shrink:0}
.col-right{flex:1;padding:8px;min-width:0}
.module{border:1px solid #000;margin-bottom:10px;background:#fff}
.module-title{color:#fff;font-weight:bold;font-size:11px;padding:3px 6px;border-bottom:1px solid #000}
.t-blue{background:linear-gradient(to bottom,#6699CC,#336699)}
.t-pink{background:linear-gradient(to bottom,#FF99CC,#CC3399)}
.t-green{background:linear-gradient(to bottom,#99CC66,#336633)}
.t-orange{background:linear-gradient(to bottom,#FFCC66,#CC6600)}
.t-purple{background:linear-gradient(to bottom,#CC99FF,#663399)}
.module-body{padding:8px;font-size:11px}
.pfp{border:3px solid #000;display:flex;align-items:center;justify-content:center;font-family:"Comic Sans MS",cursive;font-weight:bold;color:#fff;box-shadow:3px 3px 0 #999;text-shadow:2px 2px 0 rgba(0,0,0,0.4);flex-shrink:0}
.pfp-lg{width:140px;height:140px;font-size:30px;margin:0 auto 6px}
.pfp-sm{width:60px;height:60px;font-size:20px}
.pfp-xs{width:38px;height:38px;font-size:14px}
.pfp-md{width:48px;height:48px;font-size:18px}
.stat-table{width:100%;border-collapse:collapse}
.stat-table td{padding:2px 3px;border-bottom:1px dotted #999}
.stat-table td:first-child{font-weight:bold;color:#336699;width:44%}
.hitcounter{font-family:"Courier New",monospace;background:#000;color:#00FF00;padding:4px;text-align:center;letter-spacing:3px;font-size:14px;border:2px inset #999}
.glitter{height:12px;background-image:repeating-linear-gradient(90deg,#FFFF00 0 4px,#FF66CC 4px 8px,#00FFFF 8px 12px,#FF0000 12px 16px);border-top:1px solid #000;border-bottom:1px solid #000;margin:8px 0}
.top8{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.friend-tile{text-align:center;font-size:10px;cursor:pointer}
.friend-thumb{aspect-ratio:1;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;font-size:18px;margin-bottom:2px;font-family:"Comic Sans MS",cursive}
.friend-thumb:hover{border-color:#FF0000;opacity:.9}
.comment{border:1px solid #999;background:#F5F5DC;margin-bottom:8px;padding:6px}
.comment-head{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.comment-name{font-weight:bold;cursor:pointer}
.comment-date{color:#666;font-size:10px}
.comment-body{font-size:11px;word-break:break-word}
.comment-reply{text-align:right;font-size:10px;margin-top:3px}
.about-table{width:100%;border-collapse:collapse}
.about-table td{padding:3px;border-bottom:1px solid #ddd;vertical-align:top}
.about-table td:first-child{font-weight:bold;color:#CC3399;width:90px}
.song-widget{background:#000;color:#FFFF00;font-family:"Courier New",monospace;font-size:11px;padding:6px;border:2px inset #999}
.eq{display:flex;gap:2px;height:14px;margin-top:4px;align-items:flex-end}
.eq div{width:4px;background:#00FF00;animation:eq .6s ease-in-out infinite alternate}
.eq div:nth-child(2){animation-delay:.1s}
.eq div:nth-child(3){animation-delay:.2s}
.eq div:nth-child(4){animation-delay:.15s}
.eq div:nth-child(5){animation-delay:.3s}
@keyframes eq{from{height:2px}to{height:14px}}
.blink{animation:blink 1s steps(1) infinite;color:#FF0000;font-weight:bold}
@keyframes blink{50%{opacity:0}}
.online-dot{display:inline-block;width:8px;height:8px;background:#00FF00;border:1px solid #006600;border-radius:50%;margin-right:4px;animation:blink 1.2s steps(1) infinite}
.profile-header{background:linear-gradient(to right,#FF66CC,#CC99FF);border-bottom:3px double #000;padding:10px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.profile-header h1{font-family:"Comic Sans MS",cursive;font-size:22px;color:#fff;text-shadow:2px 2px 0 #990066;margin:0}
.profile-sub{font-size:11px;color:#330033;font-weight:bold}
.input-row{margin-bottom:6px}
.input-row label{display:block;font-weight:bold;margin-bottom:2px;color:#336699}
.input-row input,.input-row textarea,.input-row select{width:100%;border:2px inset #999;padding:3px;background:#fff}
.footer{background:#003366;color:#99CCFF;text-align:center;font-size:10px;padding:10px;border-top:3px solid #000;margin-top:4px}
.footer a{color:#FFFF99}
.user-card{display:flex;align-items:center;gap:8px;padding:6px;border:1px solid #999;margin-bottom:6px;background:#F0F0FF;cursor:pointer}
.user-card:hover{background:#DDEEFF;border-color:#3366CC}
.msg-item{border:1px solid #999;padding:6px;margin-bottom:6px;background:#FFFFF0;cursor:pointer}
.msg-item.unread{background:#FFFACD;border-color:#CC9900;font-weight:bold}
.msg-head{display:flex;justify-content:space-between;margin-bottom:3px}
.msg-from{font-weight:bold;color:#336699}
.msg-date{color:#666;font-size:10px}
.msg-preview{font-size:11px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.error{color:#CC0000;font-weight:bold;font-size:11px;margin:4px 0;padding:4px}
.success{color:#006600;font-weight:bold;font-size:11px;margin:4px 0;padding:4px}
.page-title{font-family:"Comic Sans MS",cursive;font-size:16px;color:#336699;border-bottom:2px solid #CC99FF;margin-bottom:8px;padding-bottom:3px}
.auth-wrap{max-width:420px;margin:40px auto;background:#fff;border:2px solid #000;box-shadow:4px 4px 0 #001a33}
.auth-header{background:linear-gradient(to right,#FF66CC,#CC99FF);padding:12px;text-align:center;border-bottom:3px double #000}
.auth-header h2{font-family:"Comic Sans MS",cursive;font-size:24px;color:#fff;text-shadow:2px 2px 0 #990066}
.auth-header p{color:#FFFFCC;font-size:11px;margin-top:4px}
.tab-row{display:flex;border-bottom:2px solid #999}
.tab{flex:1;padding:6px;text-align:center;cursor:pointer;background:#D4D0C8;font-weight:bold;border:1px solid #999}
.tab.active{background:#fff;border-bottom:2px solid #fff;margin-bottom:-2px}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:26px;height:26px;border:2px solid #999;cursor:pointer}
.color-swatch.sel{border:3px solid #000}
.flex-row{display:flex;gap:12px;flex-wrap:wrap}
.flex-1{flex:1;min-width:180px}
.flex-2{flex:2;min-width:220px}
.lineht{line-height:22px}
.browse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.browse-card{border:2px solid #000;background:#fff;box-shadow:2px 2px 0 #999;cursor:pointer;overflow:hidden}
.browse-card:hover{border-color:#FF66CC;box-shadow:3px 3px 0 #CC3399}
.browse-card-header{height:60px;display:flex;align-items:center;justify-content:center;font-family:"Comic Sans MS",cursive;font-size:28px;font-weight:bold;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,0.3)}
.browse-card-body{padding:6px;font-size:11px;border-top:2px solid #000}
.browse-card-name{font-weight:bold;font-size:13px;font-family:"Comic Sans MS",cursive;color:#336699;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.browse-card-mood{color:#666;margin-bottom:3px}
.browse-card-meta{display:flex;justify-content:space-between;color:#999;font-size:10px;border-top:1px dotted #ccc;padding-top:3px;margin-top:3px}
.browse-card-hits{color:#CC3399;font-weight:bold}
.filter-bar{background:#E8E8F8;border:1px solid #999;padding:8px;margin-bottom:10px}
.filter-bar label{font-weight:bold;color:#336699;margin-right:4px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.spotlight{background:linear-gradient(135deg,#FFFACD,#FFE4F0);border:2px solid #CC3399;padding:10px;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.spotlight-label{font-family:"Comic Sans MS",cursive;font-size:10px;color:#CC3399;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.spotlight-name{font-family:"Comic Sans MS",cursive;font-size:18px;color:#336699;font-weight:bold;cursor:pointer}
.spotlight-name:hover{color:#FF0000}
.no-results{text-align:center;padding:30px;color:#999;font-style:italic}
.sort-btn{font-size:10px;padding:2px 7px}
.sort-btn.act{background:#99CCFF}
@media(max-width:600px){.browse-grid{grid-template-columns:repeat(2,1fr)}.filter-row{flex-direction:column;align-items:flex-start}}
@media(max-width:600px){
  .layout{flex-direction:column}
  .col-left{width:100%;min-width:0;border-right:none;border-bottom:2px solid #999}
  .top8{grid-template-columns:repeat(2,1fr)}
  .pagewrap{margin:0}
  .flex-row{flex-direction:column}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo" onclick="navigate('home')">Only<span>Old</span>.com</div>
  <div class="topbar-links" id="topbar-links">
    <span style="color:#CCFFFF">Sign in or join free!</span>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-wrap"><div class="ticker" id="ticker-text">*** Welcome to OnlyOld.com — the social network that never updated ***</div></div>

<!-- PAGES -->
<div id="page-auth"></div>
<div id="page-home" class="hidden"></div>
<div id="page-profile" class="hidden"></div>
<div id="page-browse" class="hidden"></div>
<div id="page-browse2" class="hidden"></div>
<div id="page-inbox" class="hidden"></div>
<div id="page-edit" class="hidden"></div>

<!-- FOOTER -->
<div class="footer">
  &copy; 2006-2026 OnlyOld.com — the social network that never updated.<br>
  <a>Terms</a> &middot; <a>Privacy</a> &middot; <a>Help</a> &middot; Best viewed in 800&times;600 with IE6
</div>

<script>
// ── Storage (localStorage) ─────────────────────────────────────────
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};
const getUsers = () => DB.get('oo:users') || {};
const setUsers = v => DB.set('oo:users', v);
const getMsgs  = () => DB.get('oo:msgs')  || [];
const setMsgs  = v => DB.set('oo:msgs', v);

// ── Constants ──────────────────────────────────────────────────────
const COLORS = ["#FF6699","#6699FF","#66CC99","#CC99FF","#FFCC66","#FF9966","#99CCCC","#CC6699","#99CC66","#FF6666"];
const MOODS  = ["happy 😊","excited 🎉","bored 😑","sad 😢","in love 💕","angry 😤","hyper ⚡","chill 😎","confused 🤔","blessed 🙏"];
const STATUSES = ["Single","In a Relationship","It's Complicated","Married","Divorced","Widowed",""];

// ── App state ──────────────────────────────────────────────────────
let SESSION = null;   // logged-in username
let VIEW_USER = null; // profile being viewed

// ── Helpers ────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const initials = n => esc(n.slice(0,2).toUpperCase());
const uid  = () => Math.random().toString(36).slice(2,10);
const nowStr = () => new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const unreadCount = () => getMsgs().filter(m => m.to === SESSION && !m.read).length;

function pfpHtml(username, cls='pfp-lg', color) {
  const users = getUsers();
  const c = color || (users[username] && users[username].color) || '#999999';
  return `<div class="pfp ${cls}" style="background:${c}">${initials(username)}</div>`;
}

// ── Navigation ─────────────────────────────────────────────────────
function navigate(page, viewUser) {
  VIEW_USER = viewUser || null;
  ['auth','home','profile','browse','inbox','edit'].forEach(p => {
    document.getElementById('page-'+p).classList.add('hidden');
  });
  const el = document.getElementById('page-'+page);
  if (el) { el.classList.remove('hidden'); el.innerHTML = ''; }
  updateTopbar();
  updateTicker();

  if (page === 'auth')    renderAuth(el);
  if (page === 'home')    renderHome(el);
  if (page === 'profile') renderProfile(el, VIEW_USER || SESSION);
  if (page === 'browse')  renderBrowse(el);
  if (page === 'inbox')   renderInbox(el);
  if (page === 'edit')    renderEdit(el);
  window.scrollTo(0,0);
}

function updateTopbar() {
  const el = document.getElementById('topbar-links');
  const uc = unreadCount();
  if (!SESSION) {
    el.innerHTML = `<span style="color:#CCFFFF">Sign in or join free!</span>`;
  } else {
    el.innerHTML = `
      <a onclick="navigate('home')">Home</a>
      <a onclick="navigate('profile','${esc(SESSION)}')">My Profile</a>
      <a onclick="navigate('browse')">Browse</a>
      <a onclick="navigate('inbox')">Inbox ${uc > 0 ? `<span class="unread-badge">${uc}</span>` : ''}</a>
      <a onclick="navigate('edit')">Edit Profile</a>
      <a onclick="logout()">Logout</a>`;
  }
}

function updateTicker() {
  const users = getUsers();
  const names = Object.keys(users);
  const t = document.getElementById('ticker-text');
  if (names.length === 0) {
    t.textContent = '*** Welcome to OnlyOld.com — the social network that never updated ***';
  } else {
    t.textContent = `*** Welcome to OnlyOld.com *** ${names.length} member${names.length!==1?'s':''} registered *** ${names.slice(0,5).join(' · ')}${names.length>5?' and more!':''} ***`;
  }
}

function logout() { SESSION = null; navigate('auth'); }

// ── AUTH PAGE ──────────────────────────────────────────────────────
function renderAuth(el) {
  el.innerHTML = `
  <div class="auth-wrap">
    <div class="auth-header">
      <h2>Only<span style="color:#FFFF00">Old</span>.com</h2>
      <p>The social network that never updated ✨</p>
    </div>
    <div class="tab-row">
      <div class="tab active" id="tab-login" onclick="authTab('login')">Sign In</div>
      <div class="tab" id="tab-register" onclick="authTab('register')">Join Free!</div>
    </div>
    <div style="padding:16px">
      <div id="auth-error" class="error hidden"></div>
      <div class="input-row"><label>Username</label><input id="a-user" autocomplete="username"/></div>
      <div class="input-row"><label>Password</label><input id="a-pass" type="password" autocomplete="current-password"/></div>
      <div id="reg-fields" class="hidden">
        <div class="input-row"><label>Bio (optional)</label><textarea id="a-bio" rows="2"></textarea></div>
        <div class="input-row">
          <label>Profile Color</label>
          <div class="color-picker" id="a-color-picker"></div>
        </div>
        <div class="input-row"><label>Current Mood</label>
          <select id="a-mood">${MOODS.map(m=>`<option>${esc(m)}</option>`).join('')}</select>
        </div>
        <div class="input-row"><label>Now Playing (Artist - Song)</label><input id="a-song" placeholder="e.g. Kelly Clarkson - Since U Been Gone"/></div>
      </div>
      <button class="btn act" style="width:100%;padding:6px 0;font-size:12px" id="auth-submit-btn" onclick="authSubmit()">Sign In →</button>
    </div>
  </div>`;

  // color swatches
  let selColor = COLORS[0];
  const cp = document.getElementById('a-color-picker');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selColor ? ' sel' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selColor = c;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('sel'));
      sw.classList.add('sel');
      el._selColor = c;
    };
    cp.appendChild(sw);
  });
  el._selColor = selColor;
  el._authTab = 'login';

  // enter key
  el.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if(e.key==='Enter') authSubmit(); }));
}

function authTab(tab) {
  const el = document.getElementById('page-auth');
  el._authTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('reg-fields').classList.toggle('hidden', tab==='login');
  document.getElementById('auth-submit-btn').textContent = tab==='login' ? 'Sign In →' : 'Create My Profile! 🎉';
  document.getElementById('auth-error').classList.add('hidden');
}

function authSubmit() {
  const el = document.getElementById('page-auth');
  const tab = el._authTab || 'login';
  const username = document.getElementById('a-user').value.trim();
  const password = document.getElementById('a-pass').value.trim();
  const errEl = document.getElementById('auth-error');
  const showErr = msg => { errEl.textContent = msg; errEl.classList.remove('hidden'); };

  const users = getUsers();

  if (tab === 'login') {
    if (!users[username]) return showErr('Username not found.');
    if (users[username].password !== password) return showErr('Wrong password.');
    SESSION = username;
    navigate('profile', username);
  } else {
    if (!username || !password) return showErr('Fill in username and password.');
    if (username.length < 3) return showErr('Username too short (min 3 chars).');
    if (users[username]) return showErr('Username already taken.');
    users[username] = {
      username, password,
      bio: document.getElementById('a-bio').value.trim() || 'Just joined OnlyOld! 🎉',
      mood: document.getElementById('a-mood').value,
      song: document.getElementById('a-song').value.trim() || '',
      color: el._selColor || COLORS[0],
      status: 'Single', age: '', location: '',
      joinedAt: nowStr(), hits: 1,
      top8: [], comments: [], friends: [],
    };
    setUsers(users);
    SESSION = username;
    navigate('profile', username);
  }
}

// ── HOME PAGE ──────────────────────────────────────────────────────
function renderHome(el) {
  const users = getUsers();
  const me = users[SESSION];
  const others = Object.keys(users).filter(u => u !== SESSION).slice(0,8);
  el.innerHTML = `
  <div class="pagewrap">
    <div class="navrow">
      <button class="btn act">Home</button>
      <button class="btn" onclick="navigate('profile','${esc(SESSION)}')">My Profile</button>
      <button class="btn" onclick="navigate('browse')">Browse Members</button>
    </div>
    <div style="padding:12px">
      <div class="page-title">Welcome back, ${esc(SESSION)}! 👋</div>
      <div class="glitter"></div>
      <div class="flex-row">
        <div class="flex-1">
          <div class="module">
            <div class="module-title t-pink">My Quick Info</div>
            <div class="module-body">
              <div style="display:flex;gap:8px;align-items:center">
                ${pfpHtml(SESSION,'pfp pfp-sm')}
                <div><strong>${esc(SESSION)}</strong><br>Mood: ${esc(me.mood)}<br><a onclick="navigate('edit')">Edit Profile</a></div>
              </div>
            </div>
          </div>
          <div class="module">
            <div class="module-title t-blue">Quick Links</div>
            <div class="module-body lineht">
              <a onclick="navigate('profile','${esc(SESSION)}')">👤 My Profile</a><br>
              <a onclick="navigate('inbox')">📬 Inbox</a><br>
              <a onclick="navigate('browse')">🔍 Find Friends</a><br>
              <a onclick="navigate('edit')">✏️ Edit Profile</a>
            </div>
          </div>
        </div>
        <div class="flex-2">
          <div class="module">
            <div class="module-title t-green">Members (${Object.keys(users).length} total)</div>
            <div class="module-body">
              ${others.length === 0
                ? '<em style="color:#666">No other members yet — invite your friends!</em>'
                : others.map(u => `
                  <div class="user-card" onclick="navigate('profile','${esc(u)}')">
                    ${pfpHtml(u,'pfp pfp-sm')}
                    <div><strong>${esc(u)}</strong><br><span style="color:#666">${esc(users[u].mood)}</span></div>
                  </div>`).join('')}

function renderCommentsHtml(comments, viewUser) {
  const users = getUsers();
  const isMe = viewUser === SESSION;
  if (comments.length === 0) return '<em style="color:#666">No comments yet — be the first!</em>';
  return [...comments].reverse().map(c => `
    <div class="comment">
      <div class="comment-head">
        ${pfpHtml(c.author,'pfp pfp-xs')}
        <div>
          <div class="comment-name" onclick="navigate('profile','${esc(c.author)}')">${esc(c.author)}</div>
          <div class="comment-date">${esc(c.at)}</div>
        </div>
      </div>
      <div class="comment-body">${esc(c.text)}</div>
      <div class="comment-reply">
        ${(c.author===SESSION||isMe)?`<a style="color:#CC0000" onclick="deleteComment('${esc(viewUser)}','${c.id}')">delete</a>`:''}
      </div>
    </div>`).join('');
}

function toggleMsgBox() {
  const el = document.getElementById('msg-box');
  el.classList.toggle('hidden');
}

function addFriend(viewUser) {
  const users = getUsers();
  const me = users[SESSION];
  if ((me.friends||[]).includes(viewUser)) { showProfNotice('Already friends!','error'); return; }
  me.friends = [...(me.friends||[]), viewUser];
  users[SESSION] = me;
  setUsers(users);
  showProfNotice('Friend added! ✓','success');
}

function addToTop8(viewUser) {
  const users = getUsers();
  const me = users[SESSION];
  if ((me.top8||[]).includes(viewUser)) { showProfNotice('Already in your Top 8!','error'); return; }
  if ((me.top8||[]).length >= 8) { showProfNotice('Top 8 is full — remove someone first.','error'); return; }
  me.top8 = [...(me.top8||[]), viewUser];
  users[SESSION] = me;
  setUsers(users);
  showProfNotice('Added to Top 8! ✓','success');
}

function removeTop8(name, profileOwner) {
  const users = getUsers();
  const me = users[SESSION];
  me.top8 = (me.top8||[]).filter(t => t !== name);
  users[SESSION] = me;
  setUsers(users);
  navigate('profile', profileOwner);
}

function postComment(viewUser) {
  const text = document.getElementById('comment-text').value.trim();
  if (!text) return;
  const users = getUsers();
  const u = users[viewUser];
  const c = { id: uid(), author: SESSION, text, at: nowStr() };
  u.comments = [...(u.comments||[]), c];
  users[viewUser] = u;
  setUsers(users);
  document.getElementById('comments-area').innerHTML =
    renderCommentsHtml(u.comments, viewUser) +
    `<div style="margin-top:8px">
      <textarea id="comment-text" rows="3" style="width:100%;border:2px inset #999;padding:4px;font-family:Verdana;font-size:11px" placeholder="Leave ${esc(viewUser)} a comment..."></textarea>
      <button class="btn act" style="margin-top:4px" onclick="postComment('${esc(viewUser)}')">Post Comment</button>
    </div>`;
}

function deleteComment(viewUser, commentId) {
  const users = getUsers();
  const u = users[viewUser];
  u.comments = (u.comments||[]).filter(c => c.id !== commentId);
  users[viewUser] = u;
  setUsers(users);
  const isMe = viewUser === SESSION;
  document.getElementById('comments-area').innerHTML =
    renderCommentsHtml(u.comments, viewUser) +
    (!isMe ? `<div style="margin-top:8px">
      <textarea id="comment-text" rows="3" style="width:100%;border:2px inset #999;padding:4px;font-family:Verdana;font-size:11px" placeholder="Leave ${esc(viewUser)} a comment..."></textarea>
      <button class="btn act" style="margin-top:4px" onclick="postComment('${esc(viewUser)}')">Post Comment</button>
    </div>` : '');
}

function sendMsg(toUser) {
  const text = document.getElementById('msg-text').value.trim();
  if (!text) return;
  const msgs = getMsgs();
  msgs.push({ id: uid(), from: SESSION, to: toUser, text, at: nowStr(), read: false });
  setMsgs(msgs);
  document.getElementById('msg-box').classList.add('hidden');
  showProfNotice('Message sent! ✓','success');
}

function showProfNotice(msg, type) {
  const el = document.getElementById('prof-notice');
  if (!el) return;
  el.textContent = msg;
  el.className = type;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

          <div style="color:#666;margin:2px 0">${esc(users[spotlight].mood||'')}</div>
          ${users[spotlight].location?`<div style="color:#999">📍 ${esc(users[spotlight].location)}</div>`:''}
          <div style="margin-top:4px"><span style="color:#CC3399;font-weight:bold">${users[spotlight].hits||1}</span> <span style="color:#666">profile hits</span> &nbsp;·&nbsp; <span style="color:#336699">${(users[spotlight].friends||[]).length} friends</span></div>
        </div>
      </div>` : ''}

      <div class="filter-bar">
        <div class="filter-row">
          <div>
            <label>🔎 Search:</label>
            <input id="browse-q" placeholder="username..." style="border:2px inset #999;padding:3px;width:130px" oninput="browseRefresh()"/>
          </div>
          <div>
            <label>📍 Location:</label>
            <select id="browse-loc" onchange="browseRefresh()" style="border:2px inset #999;padding:2px">
              <option value="">All</option>
              ${locs.map(l=>`<option>${esc(l)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>😊 Mood:</label>
            <select id="browse-mood" onchange="browseRefresh()" style="border:2px inset #999;padding:2px">
              <option value="">All</option>
              ${moods.map(m=>`<option>${esc(m)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Sort:</label>
            <button class="btn sort-btn act" id="sort-hits"  onclick="browseSort('hits')">🔥 Hits</button>
            <button class="btn sort-btn"     id="sort-new"   onclick="browseSort('newest')">🆕 Newest</button>
            <button class="btn sort-btn"     id="sort-alpha" onclick="browseSort('alpha')">🔤 A–Z</button>
          </div>
          <div>
            <button class="btn sort-btn ${_browseView==='grid'?'act':''}" id="view-grid" onclick="browseView('grid')">▦ Grid</button>
            <button class="btn sort-btn ${_browseView==='list'?'act':''}" id="view-list" onclick="browseView('list')">☰ List</button>
          </div>
        </div>
      </div>

      <div id="browse-results"></div>
    </div>
  </div>`;

  browseRefresh();
}

function browseSort(s) {
  _browseSort = s;
  ['hits','new','alpha'].forEach(x => {
    const b = document.getElementById('sort-'+x);
    if (b) b.classList.remove('act');
  });
  const map = {hits:'hits',newest:'new',alpha:'alpha'};
  const b = document.getElementById('sort-'+map[s]);
  if (b) b.classList.add('act');
  browseRefresh();
}

function browseView(v) {
  _browseView = v;
  document.getElementById('view-grid').classList.toggle('act', v==='grid');
  document.getElementById('view-list').classList.toggle('act', v==='list');
  browseRefresh();
}

function browseRefresh() {
  const q    = (document.getElementById('browse-q')?.value||'').trim().toLowerCase();
  const loc  = document.getElementById('browse-loc')?.value||'';
  const mood = document.getElementById('browse-mood')?.value||'';
  const users = getUsers();

  let list = Object.keys(users).filter(u => {
    if (u === SESSION) return false;
    if (q   && !u.toLowerCase().includes(q)) return false;
    if (loc  && users[u].location !== loc)    return false;
    if (mood && users[u].mood !== mood)        return false;
    return true;
  });

  // sort
  if (_browseSort === 'hits')   list.sort((a,b) => (users[b].hits||1)-(users[a].hits||1));
  if (_browseSort === 'newest') list.sort((a,b) => (users[b].joinedAt||'').localeCompare(users[a].joinedAt||''));
  if (_browseSort === 'alpha')  list.sort((a,b) => a.localeCompare(b));

  const el = document.getElementById('browse-results');
  if (!el) return;

  if (list.length === 0) {
    el.innerHTML = `<div class="no-results">😢 No members match your filters.<br><a onclick="document.getElementById('browse-q').value='';document.getElementById('browse-loc').value='';document.getElementById('browse-mood').value='';browseRefresh()">Clear filters</a></div>`;
    return;
  }

  if (_browseView === 'grid') {
    el.innerHTML = `<div class="browse-grid">${list.map(u => browseCard(u, users[u])).join('')}</div>`;
  } else {
    el.innerHTML = list.map(u => browseListRow(u, users[u])).join('');
  }
}

function browseCard(username, u) {
  const friends = (u.friends||[]).length;
  const comments = (u.comments||[]).length;
  return `
  <div class="browse-card" onclick="navigate('profile','${esc(username)}')">
    <div class="browse-card-header" style="background:${esc(u.color||'#999')}">
      ${initials(username)}

    <div class="browse-card-body">
      <div class="browse-card-name">${esc(username)}</div>
      <div class="browse-card-mood">${esc(u.mood||'')}</div>
      ${u.location?`<div style="color:#999;font-size:10px">📍 ${esc(u.location)}</div>`:''}
      <div class="browse-card-meta">
        <span class="browse-card-hits">🔥 ${u.hits||1} hits</span>
        <span>👥 ${friends}</span>

function browseListRow(username, u) {

function renderInbox(el) {

    <div class="navrow">
      <button class="btn" onclick="navigate('home')">Home</button>

        <div class="module-title t-purple">New Message</div>
        <div class="module-body">
          <div class="input-row"><label>To (username)</label><input id="msg-to"/></div>
          <div class="input-row"><label>Message</label><textarea id="msg-body" rows="4"></textarea></div>

let _inboxTab = 'inbox';
function inboxTab(tab) {
  _inboxTab = tab;
  document.getElementById('tab-inbox-btn').classList.toggle('active', tab==='inbox');
  document.getElementById('tab-sent-btn').classList.toggle('active', tab==='sent');
  renderMsgList();
}

function renderMsgList() {
  const msgs = getMsgs();
  const list = _inboxTab === 'inbox'
    ? msgs.filter(m => m.to === SESSION).reverse()
    : msgs.filter(m => m.from === SESSION).reverse();
  const el = document.getElementById('msg-list');
  if (list.length === 0) { el.innerHTML = '<em style="color:#666">Nothing here yet.</em>'; return; }
  el.innerHTML = list.map(m => `
    <div class="msg-item${!m.read&&m.to===SESSION?' unread':''}" onclick="openMsg('${m.id}')">
      <div class="msg-head">
        <span class="msg-from">${_inboxTab==='inbox'?'From: '+esc(m.from):'To: '+esc(m.to)}</span>
        <span class="msg-date">${esc(m.at)}</span>
      </div>
      <div class="msg-preview">${esc(m.text)}</div>
    </div>`).join('');
}

function openMsg(id) {
  const msgs = getMsgs();
  const m = msgs.find(x => x.id === id);
  if (!m) return;
  if (!m.read && m.to === SESSION) {
    m.read = true;
    setMsgs(msgs);
    updateTopbar();
  }
  const other = m.from === SESSION ? m.to : m.from;
  document.getElementById('open-msg-area').innerHTML = `
    <div class="module" style="margin-bottom:10px">
      <div class="module-title t-blue">Message ${m.from===SESSION?'to '+esc(m.to):'from '+esc(m.from)}</div>
      <div class="module-body">
        <div style="color:#666;font-size:10px;margin-bottom:6px">${esc(m.at)}</div>
        <div style="margin-bottom:8px;line-height:18px">${esc(m.text)}</div>
        <button class="btn" onclick="navigate('profile','${esc(other)}')">View Profile</button>
        <button class="btn danger" onclick="deleteMsg('${id}')" style="margin-left:4px">Delete</button>
        <button class="btn" onclick="document.getElementById('open-msg-area').innerHTML=''" style="margin-left:4px">← Back</button>
      </div>
    </div>`;
}

function deleteMsg(id) {
  setMsgs(getMsgs().filter(m => m.id !== id));
  document.getElementById('open-msg-area').innerHTML = '';
  renderMsgList();
}

function toggleCompose() {
  document.getElementById('compose-box').classList.toggle('hidden');
}

function composeSubmit() {
  const to   = document.getElementById('msg-to').value.trim();
  const text = document.getElementById('msg-body').value.trim();
  const notice = document.getElementById('inbox-notice');
  const showN = (msg, type) => { notice.textContent=msg; notice.className=type; notice.classList.remove('hidden'); setTimeout(()=>notice.classList.add('hidden'),3000); };
  const users = getUsers();
  if (!to||!text) return showN('Fill in recipient and message.','error');
  if (!users[to]) return showN('User not found.','error');
  if (to===SESSION) return showN("Can't message yourself!",'error');
  const msgs = getMsgs();
  msgs.push({ id: uid(), from: SESSION, to, text, at: nowStr(), read: false });
  setMsgs(msgs);
  document.getElementById('msg-to').value='';
  document.getElementById('msg-body').value='';
  document.getElementById('compose-box').classList.add('hidden');
  showN('Message sent! ✓','success');
  renderMsgList();
}

          <div class="module">
            <div class="module-title t-pink">Preview</div>
            <div class="module-body" style="text-align:center">
              <div id="edit-pfp-preview" class="pfp pfp-lg" style="background:${esc(u.color)}">${initials(SESSION)}</div>
              <strong>${esc(SESSION)}</strong><br>
              <span id="edit-mood-preview" style="color:#666">${esc(u.mood)}</span>
            </div>
          </div>
          <div class="module">
            <div class="module-title t-blue">Profile Color</div>
            <div class="module-body">
              <div class="color-picker" id="edit-color-picker"></div>
            </div>
          </div>
        </div>
        <div class="flex-2">
          <div class="module">
            <div class="module-title t-blue">Personal Info</div>
            <div class="module-body">
              <div class="input-row"><label>Bio</label><textarea id="e-bio" rows="3">${esc(u.bio||'')}</textarea></div>
              <div class="input-row"><label>Age</label><input id="e-age" value="${esc(u.age||'')}" placeholder="e.g. 22"/></div>
              <div class="input-row"><label>Location</label><input id="e-loc" value="${esc(u.location||'')}" placeholder="e.g. Columbus, OH"/></div>
              <div class="input-row"><label>Relationship Status</label>
                <select id="e-status">${STATUSES.map(s=>`<option${s===u.status?' selected':''}>${esc(s)}</option>`).join('')}</select>
              </div>
              <div class="input-row"><label>Current Mood</label>
                <select id="e-mood" onchange="document.getElementById('edit-mood-preview').textContent=this.value">
                  ${MOODS.map(m=>`<option${m===u.mood?' selected':''}>${esc(m)}</option>`).join('')}
                </select>
              </div>
              <div class="input-row"><label>Now Playing (Artist - Song)</label><input id="e-song" value="${esc(u.song||'')}"/></div>
              <div class="input-row"><label>Change Password</label><input id="e-pass" type="password" placeholder="Leave blank to keep current"/></div>
              <button class="btn act" style="padding:6px 20px" onclick="saveEdit()">💾 Save Profile</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // color swatches
  let selColor = u.color || COLORS[0];
  el._editColor = selColor;
  const cp = document.getElementById('edit-color-picker');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selColor ? ' sel' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selColor = c;
      el._editColor = c;
      document.querySelectorAll('#edit-color-picker .color-swatch').forEach(s => s.classList.remove('sel'));
      sw.classList.add('sel');
      document.getElementById('edit-pfp-preview').style.background = c;
    };
    cp.appendChild(sw);
  });
}

function saveEdit() {
  const el = document.getElementById('page-edit');
  const users = getUsers();
  const u = users[SESSION];
  const pass = document.getElementById('e-pass').value.trim();
  users[SESSION] = {
    ...u,
    bio:      document.getElementById('e-bio').value.trim(),
    age:      document.getElementById('e-age').value.trim(),
    location: document.getElementById('e-loc').value.trim(),
    status:   document.getElementById('e-status').value,
    mood:     document.getElementById('e-mood').value,
    song:     document.getElementById('e-song').value.trim(),
    color:    el._editColor || u.color,
    password: pass || u.password,
  };
  setUsers(users);
  const n = document.getElementById('edit-notice');
  n.textContent = 'Profile saved! ✓';
  n.className = 'success';
  n.classList.remove('hidden');
  setTimeout(() => n.classList.add('hidden'), 2500);
}

// ── BOOT ───────────────────────────────────────────────────────────
navigate('auth');
</script>
</body>
</html>
